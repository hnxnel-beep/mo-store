<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الشخصي</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        h1 { font-size: 32px; margin-bottom: 30px; }
        .app-card {
            background: #1c1c1e;
            border-radius: 18px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .app-info { display: flex; align-items: center; gap: 15px; }
        .icon-box {
            width: 60px; height: 60px;
            background: #2c2c2e;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
        }
        .app-details h3 { margin: 0; font-size: 18px; }
        .app-details p { margin: 5px 0 0; color: #8e8e93; font-size: 14px; }
        .get-btn {
            background: #2c2c2e;
            color: #0a84ff;
            border: none;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>المتجر</h1>

    <div class="app-card">
        <div class="app-info">
            <div class="icon-box">🚀</div>
            <div class="app-details">
                <h3>تطبيق الأول</h3>
                <p>وصف بسيط للتطبيق</p>
            </div>
        </div>
        <button class="get-btn">GET</button>
    </div>

</body>
</html>
